<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Pomodoro & Virtual Clock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@500&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f1f5f9; }
        .mono { font-family: 'JetBrains+Mono', monospace; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        canvas { display: none; } /* Hidden canvas for PiP generation */
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <!-- Left Column: Pomodoro & Virtual Clock -->
        <div class="space-y-8">
            <!-- Pomodoro Timer -->
            <section class="glass rounded-3xl p-6 shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-blue-400">Pomodoro</h2>
                    <button id="pip-pomo" class="text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded-full transition">Pop Out</button>
                </div>
                
                <div class="text-center mb-8">
                    <div id="pomo-display" class="text-7xl font-bold mono tracking-tighter mb-2">25:00</div>
                    <div id="pomo-status" class="text-sm uppercase tracking-widest text-slate-400">Grind Time</div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-xs text-slate-500 mb-1">Grind (min)</label>
                        <input type="number" id="grind-input" value="25" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-center focus:outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-500 mb-1">Break (min)</label>
                        <input type="number" id="break-input" value="5" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-center focus:outline-none focus:border-blue-500">
                    </div>
                </div>

                <div class="flex gap-2">
                    <button id="pomo-start" class="flex-1 bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-semibold transition">Start</button>
                    <button id="pomo-reset" class="px-6 bg-slate-700 hover:bg-slate-600 py-3 rounded-xl font-semibold transition">Reset</button>
                </div>
            </section>

            <!-- Virtual Clock -->
            <section class="glass rounded-3xl p-6 shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-emerald-400">Virtual Clock</h2>
                    <button id="pip-clock" class="text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded-full transition">Pop Out</button>
                </div>

                <div class="text-center mb-6">
                    <div id="clock-display" class="text-5xl font-bold mono tracking-tighter">10:42:00 AM</div>
                </div>

                <div class="space-y-4">
                    <div class="flex items-center gap-2">
                        <input type="time" id="clock-set-input" class="flex-1 bg-slate-800 border border-slate-700 rounded-lg p-2 focus:outline-none focus:border-emerald-500">
                        <button id="clock-set-btn" class="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-lg text-sm font-semibold transition">Set Time</button>
                    </div>
                    <button id="clock-sync-btn" class="w-full text-xs text-slate-500 hover:text-emerald-400 transition">Sync to System Time</button>
                </div>
            </section>
        </div>

        <!-- Right Column: Task List -->
        <section class="glass rounded-3xl p-6 shadow-2xl flex flex-col h-full">
            <h2 class="text-xl font-bold text-purple-400 mb-6">Task List</h2>
            
            <div class="flex gap-2 mb-6">
                <input type="text" id="task-input" placeholder="What are we doing?" class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:border-purple-500">
                <button id="add-task" class="bg-purple-600 hover:bg-purple-500 px-4 py-2 rounded-lg font-bold transition">+</button>
            </div>

            <div id="task-list" class="space-y-3 overflow-y-auto max-h-[500px] pr-2 custom-scrollbar">
                <!-- Tasks go here -->
            </div>
            
            <div class="mt-auto pt-6 text-center text-xs text-slate-500">
                Settings & tasks are saved automatically.
            </div>
        </section>
    </div>

    <!-- Hidden Video elements for PiP -->
    <video id="pomo-video" muted autoplay style="display:none"></video>
    <video id="clock-video" muted autoplay style="display:none"></video>

    <script>
        // --- State Management ---
        let state = {
            pomo: {
                timeLeft: 1500,
                isRunning: false,
                isBreak: false,
                grindMin: 25,
                breakMin: 5
            },
            clock: {
                offset: 0, // difference from system time in ms
                isManual: false
            },
            tasks: []
        };

        // --- DOM Elements ---
        const pomoDisplay = document.getElementById('pomo-display');
        const pomoStatus = document.getElementById('pomo-status');
        const grindInput = document.getElementById('grind-input');
        const breakInput = document.getElementById('break-input');
        const pomoStartBtn = document.getElementById('pomo-start');
        const clockDisplay = document.getElementById('clock-display');
        const clockInput = document.getElementById('clock-set-input');
        const taskList = document.getElementById('task-list');
        const taskInput = document.getElementById('task-input');

        // --- Initialization ---
        function init() {
            const saved = localStorage.getItem('pomodoro_app_state');
            if (saved) {
                const parsed = JSON.parse(saved);
                state = { ...state, ...parsed };
                // Ensure timers aren't running on load
                state.pomo.isRunning = false; 
                grindInput.value = state.pomo.grindMin;
                breakInput.value = state.pomo.breakMin;
            }
            renderTasks();
            updatePomoDisplay();
            requestAnimationFrame(updateClock);
        }

        function save() {
            localStorage.setItem('pomodoro_app_state', JSON.stringify(state));
        }

        // --- Pomodoro Logic ---
        let pomoInterval;

        function updatePomoDisplay() {
            const mins = Math.floor(state.pomo.timeLeft / 60);
            const secs = state.pomo.timeLeft % 60;
            const timeStr = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            pomoDisplay.textContent = timeStr;
            pomoStatus.textContent = state.pomo.isBreak ? 'Break Time' : 'Grind Time';
            pomoStatus.className = `text-sm uppercase tracking-widest ${state.pomo.isBreak ? 'text-emerald-400' : 'text-blue-400'}`;
            
            // Update PiP if active
            updatePiPCanvas('pomo');
        }

        pomoStartBtn.onclick = () => {
            if (state.pomo.isRunning) {
                clearInterval(pomoInterval);
                pomoStartBtn.textContent = 'Start';
                pomoStartBtn.className = 'flex-1 bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-semibold transition';
            } else {
                state.pomo.grindMin = parseInt(grindInput.value) || 25;
                state.pomo.breakMin = parseInt(breakInput.value) || 5;
                pomoInterval = setInterval(() => {
                    state.pomo.timeLeft--;
                    if (state.pomo.timeLeft < 0) {
                        state.pomo.isBreak = !state.pomo.isBreak;
                        state.pomo.timeLeft = (state.pomo.isBreak ? state.pomo.breakMin : state.pomo.grindMin) * 60;
                        alert(state.pomo.isBreak ? 'Time for a break!' : 'Back to work!');
                    }
                    updatePomoDisplay();
                }, 1000);
                pomoStartBtn.textContent = 'Pause';
                pomoStartBtn.className = 'flex-1 bg-orange-600 hover:bg-orange-500 py-3 rounded-xl font-semibold transition';
            }
            state.pomo.isRunning = !state.pomo.isRunning;
            save();
        };

        document.getElementById('pomo-reset').onclick = () => {
            clearInterval(pomoInterval);
            state.pomo.isRunning = false;
            state.pomo.isBreak = false;
            state.pomo.timeLeft = (parseInt(grindInput.value) || 25) * 60;
            pomoStartBtn.textContent = 'Start';
            pomoStartBtn.className = 'flex-1 bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-semibold transition';
            updatePomoDisplay();
            save();
        };

        // --- Clock Logic ---
        function updateClock() {
            const now = new Date(Date.now() + state.clock.offset);
            const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            clockDisplay.textContent = timeStr;
            updatePiPCanvas('clock');
            requestAnimationFrame(updateClock);
        }

        document.getElementById('clock-set-btn').onclick = () => {
            const val = clockInput.value;
            if (!val) return;
            const [h, m] = val.split(':');
            const target = new Date();
            target.setHours(h, m, 0, 0);
            state.clock.offset = target.getTime() - Date.now();
            state.clock.isManual = true;
            save();
        };

        document.getElementById('clock-sync-btn').onclick = () => {
            state.clock.offset = 0;
            state.clock.isManual = false;
            save();
        };

        // --- Task Logic ---
        document.getElementById('add-task').onclick = () => {
            const text = taskInput.value.trim();
            if (!text) return;
            state.tasks.push({ id: Date.now(), text, completed: false });
            taskInput.value = '';
            renderTasks();
            save();
        };

        function renderTasks() {
            taskList.innerHTML = '';
            state.tasks.forEach(task => {
                const div = document.createElement('div');
                div.className = 'flex items-center gap-3 bg-slate-800/50 p-3 rounded-xl border border-slate-700 group';
                div.innerHTML = `
                    <input type="checkbox" ${task.completed ? 'checked' : ''} class="w-5 h-5 rounded border-slate-600 bg-slate-700 text-purple-500 focus:ring-purple-500">
                    <span class="flex-1 ${task.completed ? 'line-through text-slate-500' : ''}">${task.text}</span>
                    <button class="opacity-0 group-hover:opacity-100 text-slate-500 hover:text-red-400 transition">✕</button>
                `;
                
                div.querySelector('input').onchange = (e) => {
                    task.completed = e.target.checked;
                    renderTasks();
                    save();
                };
                
                div.querySelector('button').onclick = () => {
                    state.tasks = state.tasks.filter(t => t.id !== task.id);
                    renderTasks();
                    save();
                };
                
                taskList.appendChild(div);
            });
        }

        // --- Picture-in-Picture Logic ---
        // We use a canvas to draw the text, then captureStream to a hidden video element
        const canvases = {
            pomo: document.createElement('canvas'),
            clock: document.createElement('canvas')
        };
        
        function updatePiPCanvas(type) {
            const canvas = canvases[type];
            const ctx = canvas.getContext('2d');
            canvas.width = 400;
            canvas.height = 200;
            
            // Background
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Text
            ctx.fillStyle = type === 'pomo' ? (state.pomo.isBreak ? '#34d399' : '#60a5fa') : '#34d399';
            ctx.font = 'bold 80px JetBrains Mono, monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            const text = type === 'pomo' ? pomoDisplay.textContent : clockDisplay.textContent;
            ctx.fillText(text, 200, 100);
            
            // Subtext
            ctx.font = '20px Inter, sans-serif';
            ctx.fillStyle = '#94a3b8';
            const sub = type === 'pomo' ? (state.pomo.isBreak ? 'BREAK' : 'GRIND') : 'VIRTUAL CLOCK';
            ctx.fillText(sub, 200, 160);
        }

        async function togglePiP(type) {
            const video = document.getElementById(`${type}-video`);
            const canvas = canvases[type];
            
            try {
                if (document.pictureInPictureElement) {
                    await document.exitPictureInPicture();
                } else {
                    const stream = canvas.captureStream(10); // 10 fps is enough
                    video.srcObject = stream;
                    await video.play();
                    await video.requestPictureInPicture();
                }
            } catch (err) {
                console.error("PiP failed:", err);
                alert("Picture-in-Picture is not supported or failed to start.");
            }
        }

        document.getElementById('pip-pomo').onclick = () => togglePiP('pomo');
        document.getElementById('pip-clock').onclick = () => togglePiP('clock');

        // Init app
        init();
    </script>
</body>
</html>
